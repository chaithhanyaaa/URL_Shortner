spring.application.name=gateway-service
server.port=8085


spring.cloud.gateway.server.webmvc.routes[0].id=shortening-service
spring.cloud.gateway.server.webmvc.routes[0].uri=http://localhost:8080
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/shorten

spring.cloud.gateway.server.webmvc.routes[1].id=analytics-service
spring.cloud.gateway.server.webmvc.routes[1].uri=http://localhost:8082
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/analytics/**

spring.cloud.gateway.server.webmvc.routes[2].id=redirect-service
spring.cloud.gateway.server.webmvc.routes[2].uri=http://localhost:8081
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/*